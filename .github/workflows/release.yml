name: release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print the branch/tag operation without creating refs"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    name: Release automation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Git author
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release automation
        id: release
        run: npx --yes zx --install .github/scripts/release.mjs --dry-run=${{ inputs.dry_run }}
