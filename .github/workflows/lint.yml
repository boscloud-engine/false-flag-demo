name: lint

on:
  push:
    branches:
      - "*"

jobs:
  lint:
    name: Lint for JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: pnpm install
        working-directory: js
        run: pnpm install --frozen-lockfile

      - name: Check codegen freshness
        run: make generate-check

      - name: Lint go
        run: make lint-go

      - name: Lint JavaScript
        working-directory: js
        run: pnpm lint

      - name: Typecheck
        working-directory: js
        run: pnpm typecheck

      - name: Install spectral
        run: npm install -g "@stoplight/spectral-cli@${SPECTRAL_VERSION}"
        env:
          SPECTRAL_VERSION: "6.14.2"
      - name: Lint OpenAPI
        # github-actions format emits ::warning / ::error annotations
        # that surface in the PR's Files Changed view.
        run: |
          spectral lint \
            --ruleset .spectral.yaml \
            --format github-actions \
            api/openapi/openapi.yaml
