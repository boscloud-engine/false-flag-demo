# Default values for the falseflag-operator chart.
#
# The operator runs as a single-replica Deployment. Demo-quality only:
# no leader election, no PodDisruptionBudget, no NetworkPolicy.

replicaCount: 1

image:
  repository: ghcr.io/depot/falseflag/operator
  tag: "v1.1.0"
  pullPolicy: IfNotPresent

# api configures how the operator reaches the FalseFlag control plane.
# baseURL must point at the API's Connect listener (:8090 by default).
api:
  baseURL: "http://falseflag-api.default.svc.cluster.local:8090"
  # actor is the X-Actor header value attached to every API request.
  actor: "controller/falseflag-operator"

# probes are the operator's health/metrics endpoints. The defaults
# match cmd/falseflag-operator's defaults.
probes:
  metricsAddr: ":8082"
  healthAddr: ":8083"

serviceAccount:
  create: true
  name: ""

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

# extraEnv lets users supply additional FALSEFLAG_* env vars without
# editing the chart.
extraEnv: []
