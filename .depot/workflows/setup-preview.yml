name: setup-preview

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Preview environment slug.
        required: true
        type: string
      branch:
        description: Branch in Zagrit-HQ/false-flag-demo to deploy.
        required: true
        type: string
      pr:
        description: Pull request number associated with the preview.
        required: true
        type: string

permissions:
  contents: read

jobs:
  dispatch-preview:
    name: Dispatch GitOps preview workflow
    runs-on: depot-ubuntu-latest
    steps:
      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      - name: Dispatch create-preview
        env:
          DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
        run: |
          set -euo pipefail

          depot ci dispatch \
            --repo Zagrit-HQ/false-flag-gitops \
            --workflow create-preview.yml \
            --ref main \
            --input environment="${{ inputs.environment }}" \
            --input branch="${{ inputs.branch }}" \
            --input pr="${{ inputs.pr }}"
