name: secret-probe
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: depot-ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: validate admbp token against project lgvdzr8ffq
        env:
          DEPOT_TOKEN: ${{ secrets.admbp }}
        run: |
          set +e
          out=$(depot list builds --project lgvdzr8ffq 2>&1); code=$?
          echo "PROBE exit=$code"
          if [ $code -eq 0 ]; then
            echo "PROBE TOKEN_VALID for lgvdzr8ffq"
          else
            echo "PROBE TOKEN_INVALID"
            echo "$out" | grep -iE "invalid|denied|permission|unauthor|not found|forbidden" | head -3
          fi
