# Depot CI Migration
# Source: .github/workflows/lint.yml
#
# Changes made:
# - Changed GitHub runs-on labels to their Depot equivalents

name: lint
on:
  workflow_call:
  workflow_dispatch:
env:
  GO_VERSION: "1.26.0"
  NODE_VERSION: "22"
  SPECTRAL_VERSION: "6.14.2"
jobs:
  lint:
    name: Lint
    runs-on:
      size: 4x16
      image: d58mfwccbf.registry.depot.dev/falseflag-ci-base:go1.26-node22-pnpm10.13-pw1.49-spectral6.14-postgres16
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - fail-fast: false
        parallel:
          - name: go mod download
            run: go mod download
          - name: pnpm install
            working-directory: js
            run: pnpm install --frozen-lockfile
      - fail-fast: false
        parallel:
          - name: Check codegen freshness
            run: |
              git diff --binary > /tmp/pre-generate.diff
              make generate
              git diff --binary > /tmp/post-generate.diff
              diff -u /tmp/pre-generate.diff /tmp/post-generate.diff
          - name: Lint go
            run: make lint-go
          - name: Lint JavaScript
            working-directory: js
            run: pnpm lint
          - name: Typecheck
            working-directory: js
            run: pnpm typecheck
          - name: Lint OpenAPI
            # github-actions format emits ::warning / ::error annotations
            # that surface in the PR's Files Changed view.
            run: |
              spectral lint \
                --ruleset .spectral.yaml \
                --format github-actions \
                api/openapi/openapi.yaml
